<!DOCTYPE html>
<html>
	<head>
		<link rel="manifest" href="manifest.json" />
		<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no">
		<style>
			#polytrack-loading{position:fixed;top:0;left:0;width:100%;height:100%;background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s;}
			#polytrack-loading.hidden{opacity:0;pointer-events:none;}
			#polytrack-loading h2{color:#e0e0e0;font-family:Arial,sans-serif;font-size:24px;margin-bottom:16px;letter-spacing:1px;}
			#polytrack-loading-bar{width:220px;height:6px;background:#2a2a3e;border-radius:3px;overflow:hidden;}
			#polytrack-loading-fill{width:0%;height:100%;background:linear-gradient(90deg,#49a8e0,#5ab3e8);border-radius:3px;animation:pt-load 2s ease-in-out forwards;}
			@keyframes pt-load{0%{width:0%}20%{width:25%}50%{width:60%}80%{width:85%}95%{width:95%}100%{width:100%}}
			#polytrack-loading p{color:#666;font-family:Arial,sans-serif;font-size:12px;margin-top:12px;}
		</style>
	</head>
	<body>
		<div id="polytrack-loading">
			<h2>PolyTrack</h2>
			<div id="polytrack-loading-bar"><div id="polytrack-loading-fill"></div></div>
			<p>Loading...</p>
		</div>
		<canvas id="screen"></canvas>
		<div id="ui"></div>
		<div id="transition-layer"></div>

		<script>
			window.addEventListener('load',function(){
				setTimeout(function(){
					var el=document.getElementById('polytrack-loading');
					if(el){el.classList.add('hidden');}
				},500);
			});
		</script>
		<script type="module" src="main.bundle.js" defer></script>
	</body>
</html>
