<!DOCTYPE html>
<html>
	<head>
		<link rel="manifest" href="manifest.json" />
		<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no">
		<style>
			#loading-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s;}
			#loading-screen.hidden{opacity:0;pointer-events:none;}
			#loading-screen h1{color:#e0e0e0;font-family:Arial,sans-serif;font-size:28px;margin-bottom:20px;}
			#loading-bar-bg{width:260px;height:8px;background:#2a2a3e;border-radius:4px;overflow:hidden;}
			#loading-bar{width:0%;height:100%;background:linear-gradient(90deg,#49a8e0,#5ab3e8);border-radius:4px;transition:width .2s;}
			#loading-pct{color:#888;font-family:Arial,sans-serif;font-size:13px;margin-top:10px;}
		</style>
	</head>
	<body>
		<div id="loading-screen">
			<h1>PolyTrack</h1>
			<div id="loading-bar-bg"><div id="loading-bar"></div></div>
			<div id="loading-pct">Loading... 0%</div>
		</div>
		<canvas id="screen"></canvas>
		<div id="ui"></div>
		<div id="transition-layer"></div>

		<script>
			(function(){
				var bar=document.getElementById('loading-bar');
				var pct=document.getElementById('loading-pct');
				var screen=document.getElementById('loading-screen');
				var target=100;
				var fakePct=0;
				function updateBar(p){
					bar.style.width=p+'%';
					pct.textContent='Loading... '+Math.round(p)+'%';
				}
				var realProgress=0;
				var origFetch=window.fetch;
				if(origFetch){
					var totalBytes=15728640;
					var loadedBytes=0;
					var resources=['main.bundle.js','simulation_worker.bundle.js','lib/ammo.wasm.wasm'];
					var loaded=0;
					resources.forEach(function(r){
						var xhr=new XMLHttpRequest();
						xhr.open('GET',r,true);
						xhr.responseType='arraybuffer';
						xhr.onprogress=function(e){
							if(e.lengthComputable){loadedBytes+=e.loaded-(xhr._lastLoaded||0);xhr._lastLoaded=e.loaded;}
							var p=Math.min(90,(loadedBytes/totalBytes)*70);
							updateBar(p);
						};
						xhr.onload=function(){loaded++;realProgress=loaded/resources.length*80;updateBar(Math.max(realProgress,fakePct));};
						xhr.send();
					});
				}
				var fakeInterval=setInterval(function(){
					fakePct+=Math.random()*3;
					if(fakePct>90)fakePct=90;
					if(realProgress>0)fakePct=Math.max(fakePct,realProgress);
					updateBar(fakePct);
				},200);
				window.addEventListener('load',function(){
					clearInterval(fakeInterval);
					updateBar(100);
					pct.textContent='Starting...';
					setTimeout(function(){screen.classList.add('hidden');},300);
				});
			})();
		</script>
		<script type="module" src="main.bundle.js" defer></script>
	</body>
</html>
